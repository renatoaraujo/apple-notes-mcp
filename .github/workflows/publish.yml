name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run ci

      - name: Generate release changeset
        run: node scripts/generate-release-changeset.js

      - name: Version packages
        run: npm run version-packages

      - name: Sync lockfile
        run: npm install --package-lock-only

      - name: Detect release changes
        id: release_changes
        run: |
          if git diff --quiet -- .changeset package.json package-lock.json CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git user
        if: steps.release_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release changes
        if: steps.release_changes.outputs.changed == 'true'
        run: |
          git add .changeset package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release packages"

      - name: Capture version
        if: steps.release_changes.outputs.changed == 'true'
        id: package_version
        run: echo "version=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json','utf8')).version)")" >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.release_changes.outputs.changed == 'true'
        run: git tag "v${{ steps.package_version.outputs.version }}"

      - name: Publish to npm
        if: steps.release_changes.outputs.changed == 'true'
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Push release commit and tag
        if: steps.release_changes.outputs.changed == 'true'
        run: git push origin HEAD:main --follow-tags
